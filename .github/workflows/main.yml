name: CI/CD - Saudações Aleatórias

on:
    push:
        branches: ["*"]
    pull_request:
        branches: ["main"]
    workflow_dispatch:

env:
    DOCKER_USER: ${{ vars.DOCKER_USER }}
    DOCKER_IMAGE_NAME: ${{ vars.DOCKER_USER }}/ms-saudacoes-aleatorias
    DOCKER_IMAGE_TAG: 1.0.${{ github.run_id }}
    SERVICE_NAME: saudacoes-aleatorias

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Golang
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
                  cache: true
                  cache-dependency: true
                  cache-dependency-path: go.sum

            - name: Go Fmt & Vet
              run: |
                  echo "Linting and formatting code..."
                  go fmt ./...
                  go vet ./...
                  echo "Code linting and formatting completed."

            - name: Run golangci-lint
              uses: golangci/golangci-lint-action@v6
              with:
                  version: latest
                  args: --verbose

    test:
        name: Test
        runs-on: ubuntu-latest
        needs: lint
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set up Golang
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
                  cache: true

            - name: Install gotestsum
              run: go install gotest.tools/gotestsum@latest

            - name: Run tests and generate report
              run: |
                  echo "Running tests and generating report..."
                  # CGO_ENABLED=1 é necessário se houver código C, mas requer gcc.
                  # A imagem ubuntu-latest já tem o gcc.
                  CGO_ENABLED=1 gotestsum --junitfile report.xml --format testname

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always() # Sempre executa este passo, mesmo que o anterior falhe
              with:
                  name: test-reports
                  path: report.xml

    build-and-push-image:
        name: Build and Push Docker Image
        runs-on: ubuntu-latest
        needs: test
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ env.DOCKER_USER }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and Push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: |
                      ${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}
                      ${{ env.DOCKER_IMAGE_NAME }}:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy:
        name: Deploy to Staging
        runs-on: ubuntu-latest
        needs: build-and-push-image # Depende do sucesso do build
        if: github.event_name == 'push' && github.ref_name == 'main'
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Baixar Estado Anterior
              uses: dawidd6/action-download-artifact@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  workflow: main.yml # O nome exato deste arquivo de workflow
                  name: terraform-state
                  path: ./infra
              continue-on-error: true

            - name: Terraform Init
              id: init
              run: terraform -chdir=infra init
              env:
                  KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}

            - name: Terraform Validate
              id: validate
              run: terraform -chdir=infra validate

            - name: Terraform Apply
              id: apply
              run: terraform -chdir=infra apply -auto-approve
              env:
                  KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
                  TF_VAR_docker_image_name: ${{ env.DOCKER_IMAGE_NAME }}
                  TF_VAR_docker_image_tag: ${{ env.DOCKER_IMAGE_TAG }}

            - name: Salvar Novo Estado
              uses: actions/upload-artifact@v4
              with:
                  name: terraform-state
                  path: infra/terraform.tfstate
                  retention-days: 90 # Artefatos têm validade máxima no GitHub

    # Job para destruir a infraestrutura manualmente
    destroy:
        name: Destroy Staging
        runs-on: ubuntu-latest
        needs: deploy
        # Executa apenas quando acionado manualmente (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Baixar Estado Anterior
              uses: dawidd6/action-download-artifact@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  workflow: main.yml # O nome exato deste arquivo de workflow
                  name: terraform-state
                  path: ./infra
              continue-on-error: true

            - name: Terraform Init
              run: terraform -chdir=infra init
              env:
                  KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}

            - name: Terraform Destroy
              run: terraform -chdir=infra destroy -auto-approve
              env:
                  KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
